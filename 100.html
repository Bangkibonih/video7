<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Player</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 720px;
      padding: 10px;
    }
    .btn-unduh {
      margin-top: 15px;
      padding: 12px 20px;
      background-color: #ff5722;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }
    video {
      width: 100%;
      height: auto;
    }
  </style>

  <!-- 1. IN-PAGE PUSH (BANNER ATAS) -->
  <script>(function(s){s.dataset.zone='9810395',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

  <!-- 2. POPUNDER -->
  <script>(function(s){s.dataset.zone='9569843',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

  <!-- 3. PUSH NOTIFICATIONS -->
  <script src="https://5gvci.com/act/files/tag.min.js?z=9810378" data-cfasync="false" async></script>
</head>
<body>

  <!-- BANNER ATAS (In-Page Push akan muncul di sini otomatis) -->

  <div class="container">
    <!-- Video -->
    <video id="v" controls playsinline>
      <source src="https://putarvideo.b-cdn.net/ssstik.io_%40manusilangittt_1775958555230.mp4" type="video/mp4" />
    </video>

    <!-- Tombol Unduh -->
    <a class="btn-unduh" href="https://omg10.com/4/9810401" target="_blank" id="dl-btn">⬇️ Unduh Sekarang</a>
  </div>

  <!-- 4. VIGNETTE BANNER (HANYA SATU DI BAWAH TOMBOL) -->
  <script>(function(s){s.dataset.zone='9811736',s.src='https://n6wxm.com/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

  <!-- LOGIC -->
  <script>
    // Trigger Popunder saat video play
    document.getElementById('v').addEventListener('play',function(){
      if(!sessionStorage.getItem('pf')){
        sessionStorage.setItem('pf','1');
        if(typeof _aayekbe==='function'){try{_aayekbe();}catch(e){}}
      }
    },{once:true});

    // Trigger Push Notification saat klik download
    document.getElementById('dl-btn').addEventListener('click',function(){
      if(Notification.permission==='default'){
        Notification.requestPermission().then(function(p){
          console.log('Push status:',p);
        });
      }
    });
  </script>

</body>
</html>
