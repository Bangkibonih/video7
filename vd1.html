<!DOCTYPE html>
<html>
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;padding:10px}
.wrap{width:100%;max-width:720px}
.vid{position:relative;width:100%;background:#0a0a0a;border-radius:10px;margin:10px 0}
video{width:100%;display:block}
.btn{display:block;width:100%;padding:14px;background:#ff5722;color:#fff;text-align:center;text-decoration:none;font-weight:bold;margin:10px 0;border-radius:6px}
.back{color:#3ea6ff;text-decoration:none;font-size:14px;display:inline-block;margin-bottom:5px}
.load{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#888}
</style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="back">← Kembali</a>
  <div class="vid">
    <div class="load" id="ld">⏳ Loading...</div>
    <video id="v" controls playsinline preload="metadata">
      <source src="URL_VIDEO_DISINI" type="video/mp4">
    </video>
  </div>
  <a href="https://omg10.com/4/9810401" class="btn" target="_blank">⬇️ Unduh Sekarang</a>
</div>
<script>
var v=document.getElementById('v'),ld=document.getElementById('ld');
v.addEventListener('loadedmetadata',function(){ld.style.display='none'});
v.addEventListener('play',function(){if(!sessionStorage.getItem('pf')){sessionStorage.setItem('pf','1');if(typeof _aayekbe==='function'){try{_aayekbe();}catch(e){}}}});
v.addEventListener('error',function(){ld.textContent='❌ Error';ld.style.color='#ff5722'});
</script>
